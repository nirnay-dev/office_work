<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --excel-green: #107c41;
            --excel-green-hover: #185c37;
            --bg-light: #f3f2f1;
            --border-color: #c8c6c4;
            --cell-border: #e1dfdd;
            --active-border: #107c41;
            --text-main: #323130;
            --ribbon-bg: #ffffff;
            --header-bg: #f3f2f1;
            --header-hover: #e1dfdd;
            --header-selected: #cdd5df;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            background: var(--bg-light);
        }

        /* Top Header */
        .app-header {
            background-color: var(--excel-green);
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
        }

        /* Ribbon */
        .ribbon {
            background-color: var(--ribbon-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 6px 12px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .ribbon-group {
            display: flex;
            gap: 4px;
            align-items: center;
            border-right: 1px solid var(--border-color);
            padding-right: 16px;
        }

        .ribbon-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }

        .ribbon-btn:hover {
            background-color: var(--bg-light);
        }

        .ribbon-btn.active {
            background-color: #e1dfdd;
            border-color: var(--border-color);
        }

        .ribbon-input {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 2px 4px;
            height: 24px;
            cursor: pointer;
        }

        /* Formula Bar */
        .formula-bar-container {
            display: flex;
            align-items: center;
            background-color: var(--ribbon-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 4px 8px;
            gap: 8px;
        }

        .name-box {
            width: 80px;
            border: 1px solid var(--border-color);
            padding: 4px;
            text-align: center;
            background: white;
            font-weight: 500;
        }

        .fx-icon {
            color: #605e5c;
            font-weight: 600;
            font-style: italic;
        }

        .formula-input {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            outline: none;
        }

        .formula-input:focus {
            border-color: var(--active-border);
        }

        /* Grid */
        .grid-wrapper {
            flex-grow: 1;
            overflow: auto;
            position: relative;
            background: white;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid var(--cell-border);
            padding: 0 4px;
            height: 24px;
            min-width: 80px;
            max-width: 80px;
            white-space: nowrap;
            overflow: hidden;
            outline: none;
            user-select: none;
        }

        th {
            background-color: var(--header-bg);
            font-weight: 500;
            color: #605e5c;
            text-align: center;
            position: sticky;
            z-index: 1;
        }

        thead th {
            top: 0;
            border-bottom: 1px solid var(--border-color);
        }

        tbody th {
            left: 0;
            min-width: 40px;
            max-width: 40px;
            border-right: 1px solid var(--border-color);
        }

        thead th:first-child {
            left: 0;
            z-index: 2;
            min-width: 40px;
            max-width: 40px;
        }

        th.highlight {
            background-color: var(--header-selected);
            color: var(--excel-green);
            border-bottom: 2px solid var(--excel-green);
        }

        tbody th.highlight {
            border-right: 2px solid var(--excel-green);
            border-bottom: 1px solid var(--cell-border);
        }

        td {
            cursor: cell;
        }

        td.active {
            border: 2px solid var(--active-border);
            position: relative;
        }

        /* Autofill Handle */
        td.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            right: -3px;
            width: 6px;
            height: 6px;
            background-color: var(--active-border);
            border: 1px solid white;
            cursor: crosshair;
        }

        td.editing {
            padding: 0;
        }

        .cell-editor {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            padding: 0 4px;
            box-sizing: border-box;
        }

        /* Sheet Bar */
        .sheet-bar {
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 32px;
            gap: 4px;
        }

        .sheet-tab {
            padding: 4px 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            color: #605e5c;
        }

        .sheet-tab:hover {
            background-color: var(--header-hover);
        }

        .sheet-tab.active {
            color: var(--excel-green);
            border-bottom-color: var(--excel-green);
            background-color: white;
        }

        .add-sheet-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #605e5c;
            padding: 0 8px;
            display: flex;
            align-items: center;
        }

        .add-sheet-btn:hover {
            color: var(--excel-green);
        }

    </style>
</head>
<body>

    <div class="app-header">
        Excel Clone
    </div>

    <div class="ribbon">
        <div class="ribbon-group">
            <button class="ribbon-btn" id="btn-bold" title="Bold (Ctrl+B)"><b>B</b></button>
            <button class="ribbon-btn" id="btn-italic" title="Italic (Ctrl+I)"><i>I</i></button>
            <button class="ribbon-btn" id="btn-underline" title="Underline (Ctrl+U)"><u>U</u></button>
        </div>
        <div class="ribbon-group">
            <input type="color" class="ribbon-input" id="color-text" title="Text Color" value="#000000">
            <input type="color" class="ribbon-input" id="color-bg" title="Fill Color" value="#ffffff">
        </div>
        <div class="ribbon-group">
            <button class="ribbon-btn" id="btn-align-left" title="Align Left">⬅️</button>
            <button class="ribbon-btn" id="btn-align-center" title="Align Center">↔️</button>
            <button class="ribbon-btn" id="btn-align-right" title="Align Right">➡️</button>
        </div>
        <div class="ribbon-group">
            <button class="ribbon-btn" id="btn-clear" title="Clear All Data">🗑️ Clear Workbook</button>
        </div>
    </div>

    <div class="formula-bar-container">
        <div class="name-box" id="name-box">A1</div>
        <div class="fx-icon">fx</div>
        <input type="text" class="formula-input" id="formula-input">
    </div>

    <div class="grid-wrapper">
        <table id="grid">
            <!-- Grid generated by JS -->
        </table>
    </div>

    <div class="sheet-bar" id="sheet-bar">
        <!-- Tabs generated by JS -->
        <button class="add-sheet-btn" id="btn-add-sheet" title="New Sheet">+</button>
    </div>

    <script>
        const DEFAULT_ROWS = 100;
        const DEFAULT_COLS = 26;

        let workbook = {
            sheets: [
                { id: "sheet1", name: "Sheet1", cells: {} }
            ],
            activeSheetId: "sheet1"
        };

        let activeAddress = "A1";
        let isEditing = false;
        let evaluationStack = new Set();

        // DOM Elements
        const grid = document.getElementById('grid');
        const nameBox = document.getElementById('name-box');
        const formulaInput = document.getElementById('formula-input');
        const sheetBar = document.getElementById('sheet-bar');
        const btnAddSheet = document.getElementById('btn-add-sheet');

        // Toolbar Buttons
        const btnB = document.getElementById('btn-bold');
        const btnI = document.getElementById('btn-italic');
        const btnU = document.getElementById('btn-underline');
        const colText = document.getElementById('color-text');
        const colBg = document.getElementById('color-bg');
        const btnLeft = document.getElementById('btn-align-left');
        const btnCenter = document.getElementById('btn-align-center');
        const btnRight = document.getElementById('btn-align-right');

        // Initialization
        function init() {
            const saved = localStorage.getItem('excel_clone_data');
            if (saved) {
                workbook = JSON.parse(saved);
            }
            renderGrid();
            renderSheetBar();
            updateUI();
        }

        // State Helpers
        function getActiveSheet() {
            return workbook.sheets.find(s => s.id === workbook.activeSheetId);
        }

        function getCell(addr) {
            const sheet = getActiveSheet();
            if (!sheet.cells[addr]) {
                sheet.cells[addr] = { v: "", f: "", b: false, i: false, u: false, color: "#000000", bg: "#ffffff", align: "left" };
            }
            return sheet.cells[addr];
        }

        function save() {
            localStorage.setItem('excel_clone_data', JSON.stringify(workbook));
        }

        // Coordinate Math
        function parseAddress(addr) {
            const match = addr.match(/([A-Z]+)([0-9]+)/);
            if (!match) return {row: 1, col: 1};
            const colStr = match[1];
            const rowStr = match[2];
            let col = 0;
            for (let i = 0; i < colStr.length; i++) {
                col = col * 26 + (colStr.charCodeAt(i) - 64);
            }
            return { row: parseInt(rowStr), col: col };
        }

        function formatAddress(row, col) {
            let colStr = "";
            let tempCol = col;
            while (tempCol > 0) {
                let mod = (tempCol - 1) % 26;
                colStr = String.fromCharCode(65 + mod) + colStr;
                tempCol = Math.floor((tempCol - mod) / 26);
            }
            return `${colStr}${row}`;
        }

        function getCellsInRange(rangeStr) {
            const parts = rangeStr.split(':');
            if (parts.length === 1) return [parts[0]];
            const start = parseAddress(parts[0]);
            const end = parseAddress(parts[1]);
            const cells = [];
            for(let r = Math.min(start.row, end.row); r <= Math.max(start.row, end.row); r++) {
                for(let c = Math.min(start.col, end.col); c <= Math.max(start.col, end.col); c++) {
                    cells.push(formatAddress(r, c));
                }
            }
            return cells;
        }

        // Formula Evaluation
        function getCellValue(addr, sheet) {
            if (!sheet.cells[addr]) return "";
            const cell = sheet.cells[addr];
            if (cell.f && cell.f.startsWith('=')) {
                if (evaluationStack.has(addr)) return "#REF!";
                evaluationStack.add(addr);
                const result = evalFormula(cell.f, sheet);
                evaluationStack.delete(addr);
                return result;
            }
            return cell.v;
        }

        function evalFormula(formula, sheet) {
            try {
                let expr = formula.substring(1).toUpperCase().replace(/\s/g, '');
                
                // Process Functions
                const funcRegex = /(SUM|AVERAGE|MIN|MAX|COUNT)\(([A-Z0-9:]+)\)/g;
                expr = expr.replace(funcRegex, (match, func, range) => {
                    const cells = getCellsInRange(range);
                    const values = cells.map(addr => {
                        const val = getCellValue(addr, sheet);
                        return isNaN(parseFloat(val)) ? null : parseFloat(val);
                    }).filter(v => v !== null);

                    if (values.length === 0) return 0;
                    if (func === 'SUM') return values.reduce((a,b)=>a+b, 0);
                    if (func === 'AVERAGE') return values.reduce((a,b)=>a+b, 0) / values.length;
                    if (func === 'MIN') return Math.min(...values);
                    if (func === 'MAX') return Math.max(...values);
                    if (func === 'COUNT') return values.length;
                });

                // Process Direct References (e.g. A1)
                const cellRefRegex = /[A-Z]+[0-9]+/g;
                expr = expr.replace(cellRefRegex, (match) => {
                    const val = getCellValue(match, sheet);
                    return isNaN(parseFloat(val)) || val === "" ? 0 : parseFloat(val);
                });

                // Safety check before eval
                if (!/^[0-9+\-*/(). ]+$/.test(expr)) return "#VALUE!";
                
                const result = new Function('return ' + expr)();
                return isNaN(result) || !isFinite(result) ? "#DIV/0!" : Math.round(result * 1000000) / 1000000;
            } catch (e) {
                return "#ERROR!";
            }
        }

        // Rendering
        function renderGrid() {
            grid.innerHTML = '';
            const sheet = getActiveSheet();
            const activeCoords = parseAddress(activeAddress);
            
            // Header Row
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const cornerTh = document.createElement('th');
            headerRow.appendChild(cornerTh);
            
            for (let c = 1; c <= DEFAULT_COLS; c++) {
                const th = document.createElement('th');
                th.textContent = formatAddress(1, c).replace(/[0-9]/g, '');
                if (c === activeCoords.col) th.classList.add('highlight');
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);
            grid.appendChild(thead);

            // Body
            const tbody = document.createElement('tbody');
            for (let r = 1; r <= DEFAULT_ROWS; r++) {
                const tr = document.createElement('tr');
                const th = document.createElement('th');
                th.textContent = r;
                if (r === activeCoords.row) th.classList.add('highlight');
                tr.appendChild(th);

                for (let c = 1; c <= DEFAULT_COLS; c++) {
                    const td = document.createElement('td');
                    const addr = formatAddress(r, c);
                    td.dataset.addr = addr;
                    
                    if (sheet.cells[addr]) {
                        const cell = sheet.cells[addr];
                        td.textContent = getCellValue(addr, sheet);
                        
                        if (cell.b) td.style.fontWeight = 'bold';
                        if (cell.i) td.style.fontStyle = 'italic';
                        if (cell.u) td.style.textDecoration = 'underline';
                        if (cell.align) td.style.textAlign = cell.align;
                        if (cell.color !== "#000000") td.style.color = cell.color;
                        if (cell.bg !== "#ffffff") td.style.backgroundColor = cell.bg;
                    }

                    if (addr === activeAddress) {
                        td.classList.add('active');
                    }

                    td.addEventListener('mousedown', () => setActiveCell(addr));
                    td.addEventListener('dblclick', () => startEditing(td, addr));

                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
            grid.appendChild(tbody);
        }

        function renderSheetBar() {
            sheetBar.innerHTML = '';
            workbook.sheets.forEach(sheet => {
                const tab = document.createElement('div');
                tab.className = 'sheet-tab';
                if (sheet.id === workbook.activeSheetId) tab.classList.add('active');
                tab.textContent = sheet.name;
                tab.addEventListener('click', () => {
                    workbook.activeSheetId = sheet.id;
                    activeAddress = "A1";
                    renderGrid();
                    renderSheetBar();
                    updateUI();
                    save();
                });
                sheetBar.appendChild(tab);
            });
            sheetBar.appendChild(btnAddSheet);
        }

        // Interactions
        function setActiveCell(addr) {
            if (isEditing) return;
            activeAddress = addr;
            renderGrid();
            updateUI();
        }

        function updateUI() {
            nameBox.textContent = activeAddress;
            const cell = getCell(activeAddress);
            
            formulaInput.value = cell.f || cell.v;
            
            btnB.classList.toggle('active', cell.b);
            btnI.classList.toggle('active', cell.i);
            btnU.classList.toggle('active', cell.u);
            colText.value = cell.color;
            colBg.value = cell.bg;
            
            btnLeft.classList.toggle('active', cell.align === 'left');
            btnCenter.classList.toggle('active', cell.align === 'center');
            btnRight.classList.toggle('active', cell.align === 'right');
        }

        function startEditing(td, addr) {
            isEditing = true;
            const cell = getCell(addr);
            td.textContent = '';
            td.classList.add('editing');
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'cell-editor';
            input.value = cell.f || cell.v;
            
            td.appendChild(input);
            input.focus();
            
            const finishEditing = () => {
                if (!isEditing) return;
                isEditing = false;
                const val = input.value;
                if (val.startsWith('=')) {
                    cell.f = val;
                    cell.v = "";
                } else {
                    cell.v = val;
                    cell.f = "";
                }
                save();
                renderGrid();
                updateUI();
            };

            input.addEventListener('blur', finishEditing);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    finishEditing();
                    // Move down
                    const coords = parseAddress(activeAddress);
                    if (coords.row < DEFAULT_ROWS) {
                        setActiveCell(formatAddress(coords.row + 1, coords.col));
                    }
                }
            });
        }

        // Formula Bar Events
        formulaInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cell = getCell(activeAddress);
                const val = formulaInput.value;
                if (val.startsWith('=')) {
                    cell.f = val;
                    cell.v = "";
                } else {
                    cell.v = val;
                    cell.f = "";
                }
                save();
                renderGrid();
                formulaInput.blur();
            }
        });

        // Ribbon Formatting Events
        function applyFormat(prop, value = null) {
            const cell = getCell(activeAddress);
            if (value !== null) {
                cell[prop] = value;
            } else {
                cell[prop] = !cell[prop];
            }
            save();
            renderGrid();
            updateUI();
        }

        btnB.addEventListener('click', () => applyFormat('b'));
        btnI.addEventListener('click', () => applyFormat('i'));
        btnU.addEventListener('click', () => applyFormat('u'));
        
        colText.addEventListener('input', (e) => applyFormat('color', e.target.value));
        colBg.addEventListener('input', (e) => applyFormat('bg', e.target.value));
        
        btnLeft.addEventListener('click', () => applyFormat('align', 'left'));
        btnCenter.addEventListener('click', () => applyFormat('align', 'center'));
        btnRight.addEventListener('click', () => applyFormat('align', 'right'));

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (isEditing || document.activeElement === formulaInput) return;
            
            const coords = parseAddress(activeAddress);
            let moved = false;
            
            if (e.key === 'ArrowUp' && coords.row > 1) { coords.row--; moved = true; }
            if (e.key === 'ArrowDown' && coords.row < DEFAULT_ROWS) { coords.row++; moved = true; }
            if (e.key === 'ArrowLeft' && coords.col > 1) { coords.col--; moved = true; }
            if (e.key === 'ArrowRight' && coords.col < DEFAULT_COLS) { coords.col++; moved = true; }
            
            if (moved) {
                e.preventDefault();
                setActiveCell(formatAddress(coords.row, coords.col));
            }
            
            // Delete key
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const cell = getCell(activeAddress);
                cell.v = "";
                cell.f = "";
                save();
                renderGrid();
                updateUI();
            }
        });

        // Add Sheet
        btnAddSheet.addEventListener('click', () => {
            const id = 'sheet' + Date.now();
            const name = 'Sheet' + (workbook.sheets.length + 1);
            workbook.sheets.push({ id, name, cells: {} });
            workbook.activeSheetId = id;
            activeAddress = "A1";
            save();
            renderGrid();
            renderSheetBar();
            updateUI();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm("Are you sure you want to clear the entire workbook?")) {
                localStorage.removeItem('excel_clone_data');
                location.reload();
            }
        });

        // Boot
        init();
    </script>
</body>
</html>
